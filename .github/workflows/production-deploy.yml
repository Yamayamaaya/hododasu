name: Production Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy-api:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Cloud Build実行（マイグレーション + API本番デプロイ、並列実行）
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup GCloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Deploy API to Cloud Run
        run: |
          GCP_PROJECT_ID="${{ secrets.GCP_PROJECT_ID }}"

          # プロジェクトを設定
          gcloud config set project "${GCP_PROJECT_ID}"

          # Cloud Buildを実行（完了を待つ）
          # マイグレーションとAPIデプロイは並列実行される
          gcloud builds submit \
            --config=cloudbuild.yaml \
            --substitutions=_PROJECT_ID=${GCP_PROJECT_ID},_REGION=asia-northeast1,_SERVICE_NAME=hododasu-api \
            --source=.

          echo "✅ Cloud Build completed for production deployment"
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}

  deploy-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      checks: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8.15.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint web app
        run: pnpm --filter web lint

      - name: Type-check web app
        run: pnpm --filter web type-check

      - name: Build web app
        run: pnpm --filter web build

      # Firebase Hosting本番デプロイ
      # APIデプロイと並列実行可能（APIサービスが存在すればOK）
      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
          projectId: '${{ secrets.FIREBASE_PROJECT_ID }}'
