name: PR Cleanup

on:
  pull_request:
    types: [closed]

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup GCloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Delete Cloud Run Preview Service
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          SERVICE_NAME="hododasu-api-preview-${PR_NUMBER}"
          GCP_PROJECT_ID="${{ secrets.GCP_PROJECT_ID }}"

          gcloud config set project "${GCP_PROJECT_ID}"

          if gcloud run services describe "${SERVICE_NAME}" --region=asia-northeast1 --project="${GCP_PROJECT_ID}" >/dev/null 2>&1; then
            gcloud run services delete "${SERVICE_NAME}" \
              --region=asia-northeast1 \
              --project="${GCP_PROJECT_ID}" \
              --quiet
          else
            echo "Cloud Run preview service ${SERVICE_NAME} not found, skipping deletion"
          fi
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}

      - name: Delete Secret from Secret Manager
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          SECRET_NAME="NEON_STAGING_DB_PR_${PR_NUMBER}"
          GCP_PROJECT_ID="${{ secrets.GCP_PROJECT_ID }}"

          gcloud config set project "${GCP_PROJECT_ID}"

          if gcloud secrets describe "${SECRET_NAME}" --project="${GCP_PROJECT_ID}" >/dev/null 2>&1; then
            gcloud secrets delete "${SECRET_NAME}" --project="${GCP_PROJECT_ID}" --quiet
          else
            echo "Secret ${SECRET_NAME} not found, skipping deletion"
          fi
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}

      - name: Delete Neon Branch
        uses: neondatabase/delete-branch-action@v3
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch: pr-${{ github.event.pull_request.number }}
          api_key: ${{ secrets.NEON_API_KEY }}

      - name: Comment PR on Cleanup
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🗑️ PR cleanup completed:\n- Cloud Run preview service deleted\n- Secret Manager entry deleted\n- Neon branch deleted'
            });
